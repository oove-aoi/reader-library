spring.application.name=webDemo

# MySQL 資料庫 URL
spring.datasource.url=jdbc:mysql://localhost:3306/webDemo

# MySQL 資料庫使用者名稱
spring.datasource.username=${DB_USER}

# MySQL 資料庫密碼
spring.datasource.password=${DB_PASSWORD}

# JPA 的 Hibernate 方言
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JPA 自動生成模式
# 先暫時從 update 改成 create
spring.jpa.hibernate.ddl-auto=create 

# 顯示 SQL 日誌
spring.jpa.show-sql=true

#設定 hibernate 啟動時，會比對 Entity 和資料表結構，自動新增或變更表格欄位，但不會刪除舊欄位
spring.jpa.properties.hibernate.hbm2ddl.auto = update

#將log生成的sql自動排版
spring.jpa.properties.hibernate.format_sql = true

#在 Hibernate 自動產生的 SQL 語句上方，加上 Hibernate 產生的「說明註解（comment）」用以說明sql是因為執行了哪個查詢或操作而產生的
spring.jpa.properties.hibernate.use_sql_comments = true

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.tool.schema=DEBUG
